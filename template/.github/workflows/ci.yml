name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  ACCESS_TOKEN_SECRET: test-access-token-secret-32-chars-long
  ACCESS_TOKEN_EXPIRY: 15m
  REFRESH_TOKEN_SECRET: test-refresh-token-secret-32-chars-long
  REFRESH_TOKEN_EXPIRY: 7d
  LOG_LEVEL: error
  # NextAuth (client) — needed at build + runtime for the e2e jobs.
  AUTH_SECRET: ci-test-auth-secret-0123456789abcdefghijklmnop
  AUTH_TRUST_HOST: 'true'

jobs:
  server-sql:
    name: Server (Postgres) Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server-sql

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boilerplate_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm run db:generate
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/boilerplate_test?schema=public
          REDIS_URL: redis://localhost:6381
        run: pnpm run db:deploy
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 5002
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/boilerplate_test?schema=public
          REDIS_URL: redis://localhost:6381
        run: pnpm run test
      - name: Build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/boilerplate_test?schema=public
          REDIS_URL: redis://localhost:6381
        run: pnpm run build

  server-mongo:
    name: Server (MongoDB) Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server-mongo

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: mongo
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6382:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 5003
          DATABASE_URL: mongodb://mongo:mongo@localhost:27018/boilerplate_test?authSource=admin
          REDIS_URL: redis://localhost:6382
        run: pnpm run test
      - name: Build
        env:
          NODE_ENV: production
          DATABASE_URL: mongodb://mongo:mongo@localhost:27018/boilerplate_test?authSource=admin
          REDIS_URL: redis://localhost:6382
        run: pnpm run build

  server-supabase:
    name: Server (Supabase) Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server-supabase

    # Static gate only (lint · type-check · build). Unlike sql/mongo, the
    # server-supabase Vitest suite opens a live-DB connection globally in
    # tests/setup.ts (there is no unit-only subset), so running it in CI needs
    # supabase/setup-cli + `supabase start` + a redis service. That heavier
    # full-test job can be added later; this static gate already stops the third
    # backend from silently rotting — any lint, type, or build break fails CI.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm run build

  client:
    name: Client Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run type-check
      - name: Run tests
        run: pnpm run test
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5002/api/v1
        run: pnpm run build

  integration-e2e:
    name: API Contract + E2E (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boilerplate_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # NODE_ENV intentionally unset: the server defaults to development via envalid,
    # while `next build`/`next start` need production (setting it to development here
    # triggers the "<Html> outside _document" prerender error during next build).
    env:
      PORT: 5002
      CLIENT_URL: http://localhost:3000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/boilerplate_db?schema=public
      REDIS_URL: redis://localhost:6381
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5002/api/v1

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter server-sql run db:generate
      - name: Run migrations
        run: pnpm --filter server-sql run db:deploy
      - name: Seed admin user
        run: pnpm --filter server-sql run db:seed
      - name: Bruno API contract tests
        run: pnpm test:api:ci
      - name: Build client for E2E
        run: pnpm --filter client build
      - name: Install Chromium for Puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: Puppeteer E2E tests
        env:
          E2E_CLIENT_START: '1'
        run: pnpm test:e2e

  integration-e2e-mongo:
    name: API Contract + E2E (MongoDB)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: mongo
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6382:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # NODE_ENV intentionally unset (see the Postgres job above for why).
    env:
      PORT: 5003
      CLIENT_URL: http://localhost:3000
      API_PREFIX: /api/v1
      DATABASE_URL: mongodb://mongo:mongo@localhost:27018/boilerplate_db?authSource=admin
      REDIS_URL: redis://localhost:6382
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5003/api/v1

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Seed admin user
        run: pnpm --filter server-mongo run db:seed
      - name: Bruno API contract tests
        run: pnpm test:api:ci:mongo
      - name: Build client for E2E
        run: pnpm --filter client build
      - name: Install Chromium for Puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: Puppeteer E2E tests
        env:
          E2E_CLIENT_START: '1'
          E2E_SERVER_FILTER: server-mongo
        run: pnpm test:e2e:mongo
